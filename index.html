<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexivo Digital Marketing</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:#fff;
  color:#0a0a0a;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  background:#fff;
  border-bottom:1px solid #eee;
  z-index:100;
}

.nav-inner{
  max-width:1100px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
}

.logo img{
  height:45px;
}

.nav-links{
  display:flex;
  gap:25px;
  list-style:none;
}

.nav-links a{
  text-decoration:none;
  color:#444;
  font-size:14px;
}

/* HERO */
.hero{
  padding:120px 20px 80px;
  text-align:center;
}

.hero-logo{
  height:90px;
  margin-bottom:20px;
}

.hero h1{
  font-size:40px;
  margin-bottom:10px;
}

.hero p{
  color:#666;
  max-width:500px;
  margin:auto;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 25px;
  background:#000;
  color:#fff;
  text-decoration:none;
  border-radius:6px;
}

/* SECTION */
.section{
  padding:80px 20px;
  text-align:center;
}

footer{
  text-align:center;
  padding:20px;
  background:#000;
  color:#aaa;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a href="#" class="logo">
      <img src="images/logo.png" alt="Logo">
    </a>

    <ul class="nav-links">
      <li><a href="#">Services</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <img src="images/logo.png" class="hero-logo">

  <h1>We Grow Brands That Mean Business</h1>
  <p>Nexivo helps businesses grow using Facebook Ads, Social Media & YouTube Automation.</p>

  <a href="#" class="btn">Get Started</a>
</section>

<!-- SERVICES -->
<section class="section">
  <h2>Our Services</h2>
  <p>Facebook Ads, Social Media Management & YouTube Automation</p>
</section>

<!-- FOOTER -->
<footer>
  © 2025 Nexivo Digital Marketing
</footer>

</body>
</html>
